<!-- core/templates/core/base.html -->

{% load static %}

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'style.css' %}" />

    <title>{% block title %}HRMS{% endblock %}</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand text-primary" href="{% url 'core:dashboard' %}"
          ><i class="fas fa-building"></i> HRMS</a
        >
        <div class="fw-bold text-primary">
          {% if user.is_authenticated %}
          <span class="me-3">Hi, {{ user.username }}</span>
          <form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-secondary btn-sm">
              Logout
            </button>
          </form>
          {% else %}
          <a href="{% url 'login' %}" class="btn btn-primary btn-sm">Login</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container py-4">
      {% if messages %} {% for msg in messages %}
      <div
        class="alert alert-{{ msg.tags }} alert-dismissible fade show"
        role="alert"
      >
        {{ msg }}
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      {% endfor %} {% endif %} 
      {% block content %}{% endblock %}
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  </body>
</html>
